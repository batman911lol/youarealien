<!DOCTYPE html>
<html>
<head>
<title>Alien Surveillance Network</title>
<meta charset="UTF-8">
<style>
body{
margin:0;
background:black;
color:#00ff88;
font-family:monospace;
overflow:auto;
}
#loginScreen{
position:fixed;
top:0;left:0;width:100%;height:100%;
background:black;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
z-index:1000;
}
#loginBox{border:2px solid #00ff88;padding:30px;text-align:center;}
input{background:black;border:1px solid #00ff88;color:#00ff88;padding:8px;margin-top:10px;width:220px;}
button{background:black;border:1px solid #00ff88;color:#00ff88;padding:8px 12px;margin-top:10px;cursor:pointer;}
header{border-bottom:2px solid #00ff88;padding:12px;text-align:center;font-size:20px;}
.main{display:grid;grid-template-columns:240px 1fr 300px;}
.sidebar{border-right:2px solid #00ff88;padding:15px;}
.file{border:1px solid #00ff88;padding:10px;margin-bottom:10px;cursor:pointer;}
.viewer{padding:20px;}
.right{border-left:2px solid #00ff88;padding:15px;}
.bottom{border-top:2px solid #00ff88;padding:15px;}
#logBox{border:1px solid #00ff88;height:200px;overflow:auto;padding:10px;}
#popup,#filePopup{
position:fixed;top:50%;left:50%;
transform:translate(-50%,-50%);
background:black;border:2px solid #00ff88;
padding:20px;display:none;z-index:999;
}
</style>
</head>
<body>

<div id="loginScreen">
<div id="loginBox">
<h2>SECURE ALIEN DATABASE</h2>
<input id="passInput" type="password"><br>
<button onclick="checkPass()">ACCESS</button>
</div>
</div>

<header>ALIEN SYSTEM</header>

<div class="main">
<div class="sidebar">
<div class="file" onclick="openFile('cute')">Cute Alien Log</div>
</div>

<div class="viewer">
<h3>Alien Incident Report</h3>
<p>I found this cute alien in tuition and fell for it.</p>
<p>"Love is patient, love is kind." - 1 Corinthians 13:4</p>
</div>

<div class="right">
<input id="aiInput" placeholder="Ask AI">
<div id="aiOutput"></div>
</div>
</div>

<div class="bottom">
<div id="logBox"></div>
</div>

<div id="popup">
<div id="popupText"></div>
<input id="popupPass">
<button onclick="denyAccess()">Submit</button>
</div>

<div id="filePopup">
<div id="popupContent"></div>
</div>

<script>
function checkPass(){
if(document.getElementById("passInput").value==="321205"){
document.getElementById("loginScreen").style.display="none";
}
}

function openFile(type){
document.getElementById("popup").style.display="block";
window.currentFile="cute";
}

function denyAccess(){
let val=document.getElementById("popupPass").value;
if(val==="lol"){
document.getElementById("popup").style.display="none";
document.getElementById("filePopup").style.display="block";
document.getElementById("popupContent").innerText="Access Granted 👽";
}else{
startShutdown();
}
}

function startShutdown(){
let overlay=document.createElement("div");
overlay.style.position="fixed";
overlay.style.top="0";
overlay.style.left="0";
overlay.style.width="100%";
overlay.style.height="100%";
overlay.style.background="black";
overlay.style.color="#00ff88";
overlay.style.display="flex";
overlay.style.flexDirection="column";
overlay.style.alignItems="center";
overlay.style.justifyContent="center";
overlay.style.zIndex="9999";
document.body.appendChild(overlay);

let time=10;
let t=setInterval(()=>{
overlay.innerHTML="<h2>SHUTTING DOWN "+time+"</h2>";
time--;
if(time<0){
clearInterval(t);
overlay.innerHTML="<h2>SYSTEM SHUT DOWN</h2>";
}
},1000);
}
</script>

</body>
</html>
